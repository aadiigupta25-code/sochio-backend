name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Clean build
        run: flutter clean

      - name: Build debug APK
        run: flutter build apk --debug --verbose

      - name: Rename APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-debug.apk output/sochio-debug.apk

      - name: Get APK info
        run: |
          echo "APK built successfully!"
          ls -lh output/sochio-debug.apk
          echo "APK Size: $(du -h output/sochio-debug.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sochio-android-apk
          path: output/sochio-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "### ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Name: sochio-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(du -h output/sochio-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Location: Artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Scroll down to Artifacts section" >> $GITHUB_STEP_SUMMARY
